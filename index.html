<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dekxtopia — Kavya's landing page. Colombian music producer, Black MIDI composer, developer, and Windows modder.">
  <meta name="author" content="Kavya">
  <meta property="og:title" content="Dekxtopia — Kavya's Landing Page">
  <meta property="og:description" content="Colombian music producer, Black MIDI composer, developer, and Windows modder.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Dekxtopia — Kavya's Landing Page">
  <meta name="twitter:description" content="Colombian music producer, Black MIDI composer, developer, and Windows modder.">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Dekxtopia — Kavya's Landing Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    body {
      min-height: 100dvh;
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      color: #e2e0f0;
      background: #07071a;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── CANVAS BACKGROUND ─── */
    #neural {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ─── LAYOUT ─── */
    .page-wrapper {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
    }

    /* ─── NAVBAR ─── */
    nav {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      background: rgba(10, 8, 32, 0.6);
      border-bottom: 1px solid rgba(167, 139, 250, 0.12);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem clamp(1rem, 4vw, 2.5rem);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      color: #c4b5fd; text-decoration: none; letter-spacing: -0.01em;
    }
    .nav-logo svg { flex-shrink: 0; }
    .nav-links {
      display: flex; align-items: center; gap: 0.25rem;
      list-style: none;
    }
    .nav-links a {
      color: rgba(196,181,253,0.7); text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      padding: 0.4rem 0.8rem; border-radius: 6px;
      transition: color 180ms ease, background 180ms ease;
    }
    .nav-links a:hover { color: #c4b5fd; background: rgba(167,139,250,0.1); }
    .nav-badge {
      display: inline-block;
      background: rgba(99,63,210,0.25);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #a78bfa;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    /* ─── HERO ─── */
    .hero {
      padding: clamp(3.5rem, 8vw, 6rem) 0 clamp(2rem, 5vw, 3.5rem);
      display: flex; flex-direction: column; align-items: flex-start; gap: 1.5rem;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(99, 63, 210, 0.18);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: #c4b5fd;
    }
    .hero-badge span { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; display: inline-block; animation: pulse-dot 2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(0.7); } }

    .hero-row {
      display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
    }
    .hero-avatar {
      width: 90px; height: 90px; border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.4);
      box-shadow: 0 0 24px rgba(99,63,210,0.35), 0 0 60px rgba(99,63,210,0.12);
      object-fit: cover; flex-shrink: 0;
    }
    .hero-text { flex: 1; min-width: 220px; }
    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 1.2rem + 2.5vw, 3.4rem);
      font-weight: 700; line-height: 1.1; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 45%, #c4b5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-subtitle {
      font-size: clamp(0.9rem, 0.8rem + 0.4vw, 1.05rem);
      color: rgba(196,181,253,0.65); margin-top: 0.5rem; font-weight: 400; max-width: 55ch;
      line-height: 1.6;
    }
    .hero-desc {
      font-size: clamp(0.95rem, 0.9rem + 0.2vw, 1.05rem);
      color: rgba(226,224,240,0.75); max-width: 70ch; line-height: 1.75;
    }

    /* ─── DIVIDER ─── */
    .wiki-divider {
      border: none;
      border-top: 1px solid rgba(167,139,250,0.18);
      margin: 0.5rem 0;
    }

    /* ─── TOC ─── */
    .toc-glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.2rem 1.5rem;
      display: inline-block; min-width: 240px;
      margin: 2rem 0;
    }
    .toc-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(196,181,253,0.5);
      margin-bottom: 0.8rem;
    }
    .toc-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
    .toc-list a {
      font-size: 0.875rem; color: rgba(196,181,253,0.75); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.2rem 0.4rem; border-radius: 6px;
      transition: color 150ms ease, background 150ms ease;
    }
    .toc-list a:hover { color: #c4b5fd; background: rgba(167,139,250,0.1); }
    .toc-num { color: rgba(196,181,253,0.35); font-size: 0.75rem; min-width: 1.2rem; }

    /* ─── WIKI SECTIONS ─── */
    .wiki-section { padding: 2.5rem 0; }
    .section-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .section-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(99,63,210,0.2);
      border: 1px solid rgba(167,139,250,0.2);
      color: #a78bfa; flex-shrink: 0;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.1rem, 1rem + 0.5vw, 1.35rem);
      font-weight: 700; letter-spacing: -0.02em; color: #e2e0f0;
      border-bottom: 1px solid rgba(167,139,250,0.2);
      padding-bottom: 0.4rem; flex: 1;
    }
    .wiki-body {
      font-size: clamp(0.92rem, 0.88rem + 0.2vw, 1rem);
      color: rgba(226,224,240,0.75); line-height: 1.8; max-width: 80ch;
    }
    .wiki-body p + p { margin-top: 0.9rem; }

    /* ─── CARD GRID ─── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: 1rem; margin-top: 1.25rem;
    }
    .wiki-card {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(167,139,250,0.14);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 1.2rem 1.3rem;
      transition: border-color 200ms ease, box-shadow 200ms ease, transform 200ms ease;
      cursor: default;
    }
    .wiki-card:hover {
      border-color: rgba(167,139,250,0.35);
      box-shadow: 0 4px 24px rgba(99,63,210,0.18);
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 1.5rem; margin-bottom: 0.6rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem; font-weight: 700; color: #c4b5fd; margin-bottom: 0.35rem;
    }
    .card-desc {
      font-size: 0.83rem; color: rgba(196,181,253,0.6); line-height: 1.6;
    }

    /* ─── PLACEHOLDER SECTION ─── */
    .placeholder-section {
      padding: 2rem 0;
    }
    .placeholder-block {
      border: 1px dashed rgba(167,139,250,0.2);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      color: rgba(196,181,253,0.35);
      font-size: 0.875rem;
      font-style: italic;
    }
    .placeholder-block i { display: block; margin-bottom: 0.5rem; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid rgba(167,139,250,0.12);
      padding: 1.75rem 0;
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(196,181,253,0.35);
    }
    footer a { color: rgba(196,181,253,0.5); text-decoration: none; }
    footer a:hover { color: #c4b5fd; }

    /* ─── TOC + SOCIALS ROW ─── */
    .toc-row {
      display: flex; align-items: flex-start; gap: 1rem;
      flex-wrap: wrap; margin: 2rem 0;
      justify-content: center;
    }
    .toc-glass { margin: 0; }

    .socials-glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.2rem 1.5rem;
      min-width: 200px;
    }
    .socials-list {
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .social-link {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.3rem 0.5rem; border-radius: 8px;
      text-decoration: none;
      transition: background 150ms ease;
    }
    .social-link:hover { background: rgba(167,139,250,0.1); }
    .social-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      background: rgba(99,63,210,0.18);
      border: 1px solid rgba(167,139,250,0.15);
      color: #ff4444; flex-shrink: 0;
    }
    .social-icon:not([style]) { color: #ff4444; }
    .social-label {
      font-size: 0.875rem; color: rgba(196,181,253,0.8);
      font-weight: 500; flex: 1;
    }
    .social-tag {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(196,181,253,0.3);
      background: rgba(167,139,250,0.08);
      border: 1px solid rgba(167,139,250,0.12);
      border-radius: 4px; padding: 0.1rem 0.4rem;
    }
    @media (max-width: 600px) {
      .socials-glass { width: 100%; }
    }

    /* ─── LATEST VIDEO WIDGET ─── */
    .latest-video-glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.2rem 1.5rem;
      flex: 1 1 320px; min-width: 300px; max-width: 430px;
    }
    .yt-loading {
      display: flex; gap: 6px; align-items: center;
      padding: 1rem 0; justify-content: center;
    }
    .yt-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(196,181,253,0.35);
      animation: yt-bounce 1.2s ease-in-out infinite;
    }
    .yt-dot:nth-child(2) { animation-delay: 0.2s; }
    .yt-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes yt-bounce { 0%,80%,100%{ transform:translateY(0); } 40%{ transform:translateY(-8px); } }

    .yt-card { display: flex; flex-direction: column; gap: 0.7rem; }
    .yt-thumb-wrap {
      position: relative; border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(167,139,250,0.15);
      aspect-ratio: 16/9; background: rgba(0,0,0,0.3);
    }
    .yt-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .yt-play-btn {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35);
      opacity: 0; transition: opacity 180ms ease;
    }
    .yt-thumb-wrap:hover .yt-play-btn { opacity: 1; }
    .yt-play-btn svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
    .yt-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .yt-title {
      font-size: 0.875rem; font-weight: 600; color: rgba(226,224,240,0.9);
      line-height: 1.4; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .yt-meta { font-size: 0.75rem; color: rgba(196,181,253,0.4); }
    .yt-error { font-size: 0.8rem; color: rgba(196,181,253,0.4); text-align: center; padding: 0.75rem 0; }
    @media (max-width: 700px) { .latest-video-glass { max-width: 100%; width: 100%; } }

    /* ─── YT EMBED ─── */
    .yt-embed-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(167,139,250,0.18);
      background: #0a0a1a;
    }
    .yt-embed-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .yt-note {
      margin-top: 0.55rem;
      font-size: 0.74rem;
      color: rgba(196,181,253,0.38);
      line-height: 1.5;
    }
    .yt-channel-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      margin-top: 0.6rem;
      font-size: 0.78rem; font-weight: 500;
      color: rgba(196,181,253,0.5); text-decoration: none;
      transition: color 150ms ease;
    }
    .yt-channel-link:hover { color: #c4b5fd; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.25); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(167,139,250,0.4); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .hero-row { flex-direction: column; align-items: flex-start; }
      .toc-glass { width: 100%; }
    }
  
    /* ══════════════════════════════════════════════
       HAMBURGER BUTTON — hidden on desktop
       ══════════════════════════════════════════════ */
    .mob-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px; height: 36px;
      background: none; border: none; cursor: pointer;
      padding: 4px; border-radius: 8px;
    }
    .mob-hamburger span {
      display: block; width: 22px; height: 2px;
      background: #c4b5fd; border-radius: 2px;
      transition: transform 250ms ease, opacity 250ms ease;
    }
    .mob-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .mob-hamburger.open span:nth-child(2) { opacity: 0; }
    .mob-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ══════════════════════════════════════════════
       MOBILE MENU PORTAL
       Lives as direct child of <body> — no stacking
       context from any ancestor can clip it
       ══════════════════════════════════════════════ */
    #mob-menu {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 99999;
      background: rgba(5, 4, 18, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 1.5rem;
    }
    #mob-menu.open { display: flex; }
    #mob-menu ul {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.8rem;
      width: 100%; max-width: 340px;
    }
    #mob-menu li { width: 100%; }
    #mob-menu a {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem; font-weight: 600;
      padding: 0.95rem 1.2rem; text-align: center;
      border-radius: 12px; text-decoration: none;
      color: rgba(196,181,253,0.9);
      border: 1px solid rgba(167,139,250,0.2);
      background: rgba(99,63,210,0.12);
      transition: background 150ms, border-color 150ms, color 150ms;
    }
    #mob-menu a:active { background: rgba(99,63,210,0.3); border-color: rgba(167,139,250,0.45); color: #c4b5fd; }

    /* ══════════════════════════════════════════════
       RESPONSIVE LAYOUT  ≤ 768px
       ══════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .mob-hamburger        { display: flex; }
      .nav-links            { display: none !important; }

      .hero                 { padding: 2.5rem 0 1.5rem; gap: 1rem; }
      .hero-row             { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .hero-avatar          { width: 72px; height: 72px; }
      .hero-title           { font-size: clamp(1.7rem, 7vw, 2.4rem); }
      .hero-subtitle        { font-size: 0.88rem; max-width: 100%; }
      .hero-desc            { font-size: 0.9rem; max-width: 100%; }

      .toc-row              { flex-direction: column; gap: 0.75rem; }
      .toc-glass            { width: 100%; min-width: unset; }
      .socials-glass        { width: 100%; }

      .card-grid            { grid-template-columns: 1fr; gap: 0.75rem; }
      .wiki-section         { padding: 1.5rem 0; }
      .wiki-body            { max-width: 100%; font-size: 0.9rem; }
      .latest-video-glass   { min-width: unset; max-width: 100%; width: 100%; }
      .page-wrapper         { padding: 0 1rem; }
      footer                { font-size: 0.72rem; padding: 1.2rem 0; }
    }

    @media (max-width: 400px) {
      .hero-title { font-size: clamp(1.45rem, 8vw, 1.9rem); }
      .nav-logo   { font-size: 1rem; }
    }

    /* ── SEGA MASTER SYSTEM EMBED ── */
    .sms-glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.2rem 1.5rem;
      flex: 1 1 300px;
      min-width: 280px;
      max-width: 420px;
    }
    .sms-embed-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(167,139,250,0.15);
      background: #000;
      position: relative;
    }
    .sms-embed-wrap #sms-game,
    .sms-embed-wrap #sms-game > * {
      width: 100% !important;
      height: 100% !important;
    }
    .sms-note {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: rgba(196,181,253,0.35);
      line-height: 1.4;
    }
    @media (max-width: 768px) {
      .sms-glass { max-width: 100%; width: 100%; min-width: unset; }
    }

    /* ── EmulatorJS decorative container ── */
    #sms-game { width: 100%; height: 100%; }

    /* Force-hide virtual gamepad — correct class from EJS source */
    .ejs_virtualGamepad_parent,
    .ejs_virtualGamepad,
    .ejs_gamepad,
    [class*="virtualGamepad"],
    [class*="nipple"] {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    #sms-game canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ═══════════════════════════════════════════
       EMULATOR CAROUSEL
       ═══════════════════════════════════════════ */
    .emu-carousel { position: relative; }

    .emu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 0.5rem;
    }
    .emu-title { margin-bottom: 0 !important; flex: 1; text-align: center; }

    .emu-arrow {
      background: rgba(99,63,210,0.2);
      border: 1px solid rgba(167,139,250,0.25);
      color: #c4b5fd;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 150ms, border-color 150ms;
    }
    .emu-arrow:hover { background: rgba(99,63,210,0.4); border-color: rgba(167,139,250,0.5); }
    .emu-arrow:disabled { opacity: 0.25; cursor: default; }

    /* Dots */
    .emu-dots {
      display: flex; justify-content: center; gap: 6px;
      margin-top: 0.6rem;
    }
    .emu-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(167,139,250,0.2);
      border: 1px solid rgba(167,139,250,0.3);
      cursor: pointer;
      transition: background 200ms;
    }
    .emu-dot.active { background: #a78bfa; border-color: #a78bfa; }

    /* Tooltip */
    .sms-embed-wrap { position: relative; }
    .emu-tooltip {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(5,4,18,0.93);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 1rem;
      overflow-y: auto;
      flex-direction: column;
      gap: 0.6rem;
    }
    .emu-tooltip.visible { display: flex; }
    .emu-tooltip-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      color: #c4b5fd;
      font-weight: 600;
      line-height: 1.4;
    }
    .emu-tooltip-controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.3rem 1rem;
    }
    .emu-ctrl-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: rgba(196,181,253,0.75);
    }
    .emu-ctrl-btn {
      background: rgba(99,63,210,0.25);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.7rem;
      color: #c4b5fd;
      font-family: monospace;
    }
</style>
