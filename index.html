    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Screenshot-2025-01-18-11-03-15.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -3;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(30, 5, 51, 0.85) 0%, 
                rgba(17, 10, 31, 0.9) 25%, 
                rgba(3, 7, 18, 0.95) 50%, 
                rgba(10, 22, 40, 0.9) 75%, 
                rgba(26, 11, 46, 0.85) 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            mix-blend-mode: multiply;
            z-index: -2;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .profile {
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(147, 51, 234, 0.8),
                         0 0 60px rgba(139, 92, 246, 0.5);
        }

        .profile p {
            color: #c4b5fd;
            font-size: 1rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(135deg, 
                rgba(88, 28, 135, 0.4), 
                rgba(67, 20, 100, 0.4));
            border: 1px solid rgba(167, 139, 250, 0.4);
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            position: relative;
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
            animation-fill-mode: both;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .link-button:nth-child(1) { animation-delay: 0.1s; }
        .link-button:nth-child(2) { animation-delay: 0.2s; }
        .link-button:nth-child(3) { animation-delay: 0.3s; }
        .link-button:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .link-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(167, 139, 250, 0.5), 
                transparent);
            transition: left 0.5s ease;
        }

        .link-button:hover::before {
            left: 100%;
        }

        .link-button:hover {
            transform: translateY(-3px);
            border-color: rgba(196, 181, 253, 0.7);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.5),
                        0 0 40px rgba(167, 139, 250, 0.3);
            background: linear-gradient(135deg, 
                rgba(109, 40, 217, 0.5), 
                rgba(88, 28, 135, 0.5));
        }

        .link-button:active {
            transform: translateY(-1px);
        }

        .icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
        }

        @media (max-width: 640px) {
            .profile h1 {
                font-size: 1.5rem;
            }

            .link-button {
                padding: 16px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(167, 139, 250, 0.6)';
                ctx.fill();
            }
        }

        let particles = [];
        const particleCount = 80;
        const maxDistance = 150;

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.5;
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(139, 92, 246, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            connectParticles();
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
